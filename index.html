<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormExample</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./styles.css">
</head>

<body >

  <div class="container d-flex justify-content-center align-items-center custom-container page-center">
    <form id="userForm" style="width: 500px;">
  
      <div class="mb-3">
        <label for="nameInput" class="form-label">Name</label>
        <input type="name" class="form-control" id="nameInput" placeholder="Enter your name" required>
      </div>
  
      <div class="mb-3">
        <label for="emailInput" class="form-label">Email</label>
        <input type="email" class="form-control" id="emailInput" placeholder="Enter your email" required>
      </div>
  
      <div class="mb-3">
        <label for="ageInput" class="form-label">Age</label>
        <input type="number" class="form-control" id="ageInput" placeholder="Enter your age" min="1" max="120" required>
      </div>
      <div class="mb-3" style="text-align: center; padding-top: 20px;">
        <button type="submit" id="btnSubmit" class="btn btn-primary w-50">
          Submit
        </button>
      </div>
  
    </form>
  </div>

  <div id="alertText" class="alert alert-danger mt-3 container d-none fade show" role="alert">
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <script src="./js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
